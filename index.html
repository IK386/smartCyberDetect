<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartCyberDetect Level 11</title>

<!-- Particles.js Library -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --main-bg: #0b132b;
    --header-bg: #1c2541;
    --text-color: white;
    --btn-color: #00d4ff;
}
body {
    margin: 0;
    font-family: Arial;
    color: var(--text-color);
    background: var(--main-bg);
    overflow-x: hidden;
    scroll-behavior: smooth;
}
header {
    background-color: rgba(28,37,65,0.9);
    padding: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
header h1 { color: var(--btn-color); margin:0; }
nav a { color: var(--btn-color); margin:0 15px; font-weight:bold; text-decoration:none; transition: color 0.3s; }
nav a:hover { color:#00aacc; }
.toggle-btn { padding:8px 15px; border-radius:5px; cursor:pointer; background-color: var(--btn-color); color:black; border:none; font-weight:bold; transition: transform 0.2s, background 0.3s; }
.toggle-btn:hover { transform: scale(1.1); background-color:#00aacc; }
.page { padding:50px 20px; opacity:0; transform:translateY(20px); transition: all 0.8s ease; }
.page.active { opacity:1; transform:translateY(0); }
img { width:300px; border-radius:10px; transition: transform 0.3s; }
img:hover { transform: scale(1.1) rotate(5deg); }
.btn { margin-top:20px; padding:10px 20px; background-color: var(--btn-color); color:black; border:none; border-radius:5px; cursor:pointer; transition: all 0.3s; }
.btn:hover { background-color:#00aacc; transform: scale(1.15) rotate(-5deg); }
form { max-width:400px; margin:20px auto; display:flex; flex-direction:column; gap:15px; }
input, textarea { padding:10px; border-radius:5px; border:none; font-size:16px; }
.submit-btn { background-color: var(--btn-color); color:black; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; transition: transform 0.2s, background 0.3s; }
.submit-btn:hover { transform:scale(1.1); background-color:#00aacc; }
#particles-js { position:fixed; width:100%; height:100%; top:0; left:0; z-index:-1; }
#chart { max-width:600px; margin:30px auto; }
body.light-mode { --main-bg:#f4f4f4; --header-bg:#d1d1d1; --text-color:#111; --btn-color:#ff8c00; background:#f4f4f4; }
</style>

<script>
function showMessage(){ alert("Welcome to SmartCyberDetect 🚀"); }
function showPage(pageId){ document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(pageId).classList.add('active'); }
function toggleMode(){ document.body.classList.toggle('light-mode'); }
function submitForm(e){ e.preventDefault(); alert("Your message has been sent! ✅"); e.target.reset(); }
window.onload=function(){ showPage('home'); renderChart(); initParticles(); }
function renderChart(){ const ctx = document.getElementById('threatChart').getContext('2d'); new Chart(ctx,{ type:'bar', data:{ labels:['Malware','Phishing','Ransomware','Spyware','Other'], datasets:[{ label:'Detected Threats', data:[12,19,7,5,3], backgroundColor:'rgba(0,212,255,0.7)'}]}, options:{ responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}}}});
}
function initParticles(){ particlesJS('particles-js', { particles: { number: { value:80 }, color:{value:'#00d4ff'}, shape:{type:'circle'}, opacity:{value:0.5}, size:{value:3}, move:{enable:true,speed:2} }, interactivity:{ events:{ onhover:{ enable:true, mode:'repulse' } } } }); }
</script>
</head>
<body>
<div id="particles-js"></div>
<header>
<h1>SmartCyberDetect 🔥</h1>
<div>
<nav>
<a href="#" onclick="showPage('home')">Accueil</a>
<a href="#" onclick="showPage('about')">About</a>
<a href="#" onclick="showPage('contact')">Contact</a>
</nav>
<button class="toggle-btn" onclick="toggleMode()">Toggle Mode</button>
</div>
</header>
