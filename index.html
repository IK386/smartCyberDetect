<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartCyberDetect Level 10</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --text-color: white;
    --btn-color: #00d4ff;
}

body {
    margin: 0;
    font-family: Arial;
    color: var(--text-color);
    text-align: center;
    background: linear-gradient(-45deg, #0b132b, #1c2541, #0b132b, #1c2541);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

header {
    background-color: rgba(28,37,65,0.9);
    padding: 20px;
    position: sticky;
    top: 0;
}

h1 { color: var(--btn-color); }

nav a {
    color: var(--btn-color);
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover { color: #00aacc; }

.page { display: none; margin-top: 40px; }
.active { display: block; }

img {
    width: 300px;
    border-radius: 10px;
    transition: 0.3s;
}

img:hover { transform: scale(1.1); }

.btn {
    padding: 10px 20px;
    background-color: var(--btn-color);
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.btn:hover {
    background-color: #00aacc;
    transform: scale(1.1);
}

.toggle-btn {
    margin-left: 20px;
    padding: 5px 10px;
    cursor: pointer;
}

body.light {
    --text-color: black;
    --btn-color: orange;
    background: #f4f4f4;
}

form {
    max-width: 300px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

input, textarea {
    padding: 10px;
    border-radius: 5px;
    border: none;
}

footer {
    margin-top: 50px;
    padding: 10px;
    background: #1c2541;
}
</style>

<script>
function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function toggleMode() {
    document.body.classList.toggle('light');
}

function showMessage() {
    alert("Welcome to SmartCyberDetect 🚀");
}

function sendForm(e) {
    e.preventDefault();
    alert("Message sent successfully ✅");
}

window.onload = function() {
    showPage('home');

    const ctx = document.getElementById('chart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Malware','Phishing','Ransomware','Spyware'],
            datasets: [{
                data: [10, 15, 7, 5]
            }]
        }
    });
}
</script>

</head>

<body>

<header>
    <h1>SmartCyberDetect 🔥</h1>
    <nav>
        <a href="#" onclick="showPage('home')">Home</a>
        <a href="#" onclick="showPage('about')">About</a>
        <a href="#" onclick="showPage('contact')">Contact</a>
    </nav>
    <button class="toggle-btn" onclick="toggleMode()">Mode</button>
</header>

<div id="home" class="page">
    <h2>Welcome</h2>
    <p>Cybersecurity project website</p>
    <img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png">
    <br><br>
    <button class="btn" onclick="showMessage()">Click Me</button>

    <h3>Threat Analysis</h3>
    <canvas id="chart"></canvas>
</div>

<div id="about" class="page">
    <h2>About</h2>
    <p>This project detects cyber threats using smart techniques.</p>
</div>

<div id="contact" class="page">
    <h2>Contact</h2>
    <form onsubmit="sendForm(event)">
        <input type="text" placeholder="Name" required>
        <input type="email" placeholder="Email" required>
        <textarea placeholder="Message"></textarea>
        <button class="btn">Send</button>
    </form>
</div>

<footer>
    <p>© 2026 SmartCyberDetect</p>
</footer>

</body>
</html>
